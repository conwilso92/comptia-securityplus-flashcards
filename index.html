<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompTIA Security+ Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  .app { max-width: 700px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.4rem; text-align: center; margin-bottom: 4px; color: #f1f5f9; }
  .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 24px; }
  .cat-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .cat-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
  .cat-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  .cat-btn.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar { flex: 1; height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 3px; transition: width 0.4s; }
  .progress-text { font-size: 0.8rem; color: #64748b; white-space: nowrap; }
  .card-container { perspective: 1000px; margin-bottom: 20px; }
  .card { position: relative; width: 100%; min-height: 220px; cursor: pointer; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .card-front { background: linear-gradient(145deg, #1e293b, #162032); border: 1px solid #334155; }
  .card-back { background: linear-gradient(145deg, #1a2744, #152238); border: 1px solid #2d4a6f; transform: rotateY(180deg); }
  .card-cat { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #60a5fa; margin-bottom: 16px; font-weight: 600; }
  .card-question { font-size: 1.15rem; line-height: 1.5; color: #f1f5f9; }
  .card-answer { font-size: 1.2rem; line-height: 1.6; color: #a5f3fc; font-weight: 600; }
  .card-answer .acr-full { display: block; font-size: 0.85rem; color: #7dd3fc; font-weight: 400; margin-top: 6px; }
  .card-hint { font-size: 0.75rem; color: #475569; margin-top: 20px; }
  .conf-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .conf-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .conf-btn:hover { transform: translateY(-1px); }
  .conf-miss { background: #7f1d1d; color: #fca5a5; }
  .conf-miss:hover { background: #991b1b; }
  .conf-shaky { background: #78350f; color: #fcd34d; }
  .conf-shaky:hover { background: #92400e; }
  .conf-got { background: #14532d; color: #86efac; }
  .conf-got:hover { background: #166534; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; }
  .nav-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .nav-btn:hover { background: #334155; color: #e2e8f0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .shuffle-btn { padding: 10px 22px; border-radius: 10px; border: 1px solid #334155; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
  .shuffle-btn:hover { border-color: #8b5cf6; color: #a78bfa; }
  .stats { display: flex; justify-content: center; gap: 24px; margin-top: 24px; padding: 16px; background: #1e293b; border-radius: 12px; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: 700; }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat-miss .stat-num { color: #f87171; }
  .stat-shaky .stat-num { color: #fbbf24; }
  .stat-got .stat-num { color: #4ade80; }
  .stat-unseen .stat-num { color: #64748b; }
  .filter-mode { text-align: center; font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
  .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
  .empty-state p { margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS = [

  // ========== GENERAL SECURITY CONCEPTS (12%) ==========
  { cat: "Security Concepts", q: "What are the three principles of the CIA triad?", a: "Confidentiality, Integrity, Availability" },
  { cat: "Security Concepts", q: "What does Confidentiality mean in the CIA triad?", a: "Only authorized users can access data" },
  { cat: "Security Concepts", q: "What does Integrity mean in the CIA triad?", a: "Data is accurate, trustworthy, and has not been tampered with" },
  { cat: "Security Concepts", q: "What does Availability mean in the CIA triad?", a: "Data and systems are accessible when needed" },
  { cat: "Security Concepts", q: "What is nonrepudiation?", a: "The assurance that someone cannot deny having performed an action" },
  { cat: "Security Concepts", q: "What does the DAD triad stand for?", a: "Disclosure, Alteration, Denial<span class='acr-full'>(The opposite of CIA — represents attack outcomes)</span>" },
  { cat: "Security Concepts", q: "What security control type stops an attack before it occurs?", a: "Preventive control<span class='acr-full'>(e.g., firewalls, encryption, access control)</span>" },
  { cat: "Security Concepts", q: "What security control type identifies attacks that have already occurred?", a: "Detective control<span class='acr-full'>(e.g., IDS, security cameras, audit logs)</span>" },
  { cat: "Security Concepts", q: "What security control type reduces damage after an attack?", a: "Corrective control<span class='acr-full'>(e.g., restoring from backup after ransomware)</span>" },
  { cat: "Security Concepts", q: "What security control type discourages attackers from attempting an attack?", a: "Deterrent control<span class='acr-full'>(e.g., warning signs, guard dogs, barbed wire)</span>" },
  { cat: "Security Concepts", q: "What security control type informs employees what they should do?", a: "Directive control<span class='acr-full'>(e.g., policies, procedures, training)</span>" },
  { cat: "Security Concepts", q: "What is a compensating control?", a: "An alternative control used when the original requirement cannot be met, while still providing equivalent security" },
  { cat: "Security Concepts", q: "What is a gap analysis in cybersecurity?", a: "A review of all security controls to find where they fail to meet objectives" },
  { cat: "Security Concepts", q: "What are the three security control categories?", a: "Technical, Administrative (Managerial), Physical" },
  { cat: "Security Concepts", q: "What is the principle of least privilege?", a: "Users and processes receive only the minimum access needed to perform their job" },
  { cat: "Security Concepts", q: "What is defense in depth?", a: "A layered security strategy using multiple controls so no single failure compromises the system" },
  { cat: "Security Concepts", q: "What is Zero Trust?", a: "A security model that never trusts and always verifies — every access request is authenticated regardless of location" },
  { cat: "Security Concepts", q: "What are the key components of Zero Trust?", a: "Policy engines, policy administrators, policy enforcement points, adaptive identity" },
  { cat: "Security Concepts", q: "What does threat scope reduction mean in Zero Trust?", a: "Limiting what a subject can do or access to minimize damage if a compromise occurs<span class='acr-full'>(also called 'limited blast radius')</span>" },
  { cat: "Security Concepts", q: "What is data at rest?", a: "Data stored on disk, drives, or databases" },
  { cat: "Security Concepts", q: "What is data in transit?", a: "Data moving across a network" },
  { cat: "Security Concepts", q: "What is data in use?", a: "Data actively being processed in memory" },

  // ========== THREATS, VULNERABILITIES & MITIGATIONS (22%) ==========
  { cat: "Threats & Attacks", q: "What is a script kiddie?", a: "An unskilled attacker who uses tools and exploits written by others" },
  { cat: "Threats & Attacks", q: "What is a hacktivist?", a: "An attacker who uses hacking to promote a political or social cause" },
  { cat: "Threats & Attacks", q: "What is an APT?", a: "APT<span class='acr-full'>(Advanced Persistent Threat — a sophisticated, long-duration attack often backed by nation-states or organized crime)</span>" },
  { cat: "Threats & Attacks", q: "What is a white-hat hacker?", a: "An authorized security professional who tests systems with permission to improve security" },
  { cat: "Threats & Attacks", q: "What is a black-hat hacker?", a: "An unauthorized attacker with malicious intent" },
  { cat: "Threats & Attacks", q: "What is a gray-hat hacker?", a: "An attacker who acts without authorization but intends to inform the target of vulnerabilities" },
  { cat: "Threats & Attacks", q: "What is a zero-day attack?", a: "An attack exploiting a previously unknown vulnerability that has not yet been patched" },
  { cat: "Threats & Attacks", q: "What is ransomware?", a: "Malware that encrypts a victim's files and demands payment for the decryption key" },
  { cat: "Threats & Attacks", q: "What is a Trojan?", a: "Malware disguised as legitimate software that relies on users running it" },
  { cat: "Threats & Attacks", q: "What is a worm?", a: "Self-replicating malware that spreads across networks without user interaction" },
  { cat: "Threats & Attacks", q: "What is a rootkit?", a: "Malware that provides persistent backdoor access while hiding itself deep in the OS" },
  { cat: "Threats & Attacks", q: "What is a backdoor?", a: "A method that bypasses normal authentication to give attackers unauthorized access" },
  { cat: "Threats & Attacks", q: "What is a bot/botnet?", a: "A botnet is a group of infected devices remotely controlled by an attacker for DDoS attacks, spam, or cryptocurrency mining" },
  { cat: "Threats & Attacks", q: "What is a keylogger?", a: "Malware that captures and records keystrokes to steal credentials and other input" },
  { cat: "Threats & Attacks", q: "What is a logic bomb?", a: "Malicious code hidden inside programs that activates when specific conditions are met" },
  { cat: "Threats & Attacks", q: "What is spyware?", a: "Malware designed to collect information about a user or organization without their knowledge" },
  { cat: "Threats & Attacks", q: "What are PUPs?", a: "PUPs<span class='acr-full'>(Potentially Unwanted Programs — software installed without user awareness, often bundled with other software)</span>" },
  { cat: "Threats & Attacks", q: "What is a fileless virus?", a: "Malware that operates entirely in memory without writing files to disk, making it harder to detect" },
  { cat: "Threats & Attacks", q: "What is phishing?", a: "A mass social engineering attack using fraudulent emails to steal credentials or deliver malware" },
  { cat: "Threats & Attacks", q: "What is spear phishing?", a: "A targeted phishing attack aimed at a specific person or organization" },
  { cat: "Threats & Attacks", q: "What is whaling?", a: "Spear phishing targeting executives or high-value individuals" },
  { cat: "Threats & Attacks", q: "What is vishing?", a: "Social engineering via phone calls<span class='acr-full'>(Voice phishing)</span>" },
  { cat: "Threats & Attacks", q: "What is smishing?", a: "Social engineering via SMS text messages<span class='acr-full'>(SMS phishing)</span>" },
  { cat: "Threats & Attacks", q: "What is tailgating?", a: "Following someone through a secure door without badging in" },
  { cat: "Threats & Attacks", q: "What is shoulder surfing?", a: "Looking over someone's shoulder to steal sensitive information" },
  { cat: "Threats & Attacks", q: "What is a DDoS attack?", a: "DDoS<span class='acr-full'>(Distributed Denial of Service — floods a target from many sources to make it unavailable)</span>" },
  { cat: "Threats & Attacks", q: "What is a SYN flood?", a: "A DDoS attack that overwhelms a server with TCP SYN requests without completing the handshake" },
  { cat: "Threats & Attacks", q: "What is an on-path attack?", a: "An attack where the attacker intercepts and potentially alters communication between two parties<span class='acr-full'>(formerly Man-in-the-Middle)</span>" },
  { cat: "Threats & Attacks", q: "What is ARP spoofing?", a: "Sending fake ARP replies to link the attacker's MAC address to a legitimate IP address" },
  { cat: "Threats & Attacks", q: "What is DNS poisoning?", a: "Corrupting DNS records to redirect users to malicious websites" },
  { cat: "Threats & Attacks", q: "What is SQL injection?", a: "Inserting malicious SQL code into a query to manipulate a database" },
  { cat: "Threats & Attacks", q: "What is blind SQL injection?", a: "SQL injection where the attacker receives no direct output but infers information from application behavior" },
  { cat: "Threats & Attacks", q: "What is XSS?", a: "XSS<span class='acr-full'>(Cross-Site Scripting — injecting malicious scripts into web pages viewed by other users)</span>" },
  { cat: "Threats & Attacks", q: "What is stored/persistent XSS?", a: "Malicious script is saved on the server and executed every time a user visits the affected page" },
  { cat: "Threats & Attacks", q: "What is reflected XSS?", a: "Malicious script is embedded in a URL and reflected off the server to the victim's browser" },
  { cat: "Threats & Attacks", q: "What is CSRF?", a: "CSRF<span class='acr-full'>(Cross-Site Request Forgery — tricks authenticated users into submitting malicious requests)</span>" },
  { cat: "Threats & Attacks", q: "What is a buffer overflow?", a: "Writing more data to a memory buffer than it can hold, potentially overwriting adjacent memory to execute malicious code" },
  { cat: "Threats & Attacks", q: "What is directory traversal?", a: "An attack that manipulates file path input to access directories and files outside the intended location" },
  { cat: "Threats & Attacks", q: "What is a race condition?", a: "A vulnerability where the outcome depends on the sequence of events, exploitable when a program checks a condition and then acts before the state changes" },
  { cat: "Threats & Attacks", q: "What is an evil twin attack?", a: "A rogue wireless access point that mimics a legitimate one to trick users into connecting" },
  { cat: "Threats & Attacks", q: "What is bluejacking?", a: "Sending unsolicited messages to Bluetooth-enabled devices" },
  { cat: "Threats & Attacks", q: "What is bluesnarfing?", a: "Unauthorized access to data on a Bluetooth device" },
  { cat: "Threats & Attacks", q: "What is a replay attack?", a: "Capturing and retransmitting valid data (e.g., session cookies) to gain unauthorized access" },
  { cat: "Threats & Attacks", q: "What is a password spraying attack?", a: "Trying a small number of commonly used passwords against many accounts to avoid lockout" },
  { cat: "Threats & Attacks", q: "What is a dictionary attack?", a: "Using a list of common words and passwords to guess credentials" },
  { cat: "Threats & Attacks", q: "What is a brute force attack?", a: "Systematically trying every possible combination of characters until the correct password is found" },
  { cat: "Threats & Attacks", q: "What is credential stuffing?", a: "Using stolen username/password pairs from one breach to try to access other services" },
  { cat: "Threats & Attacks", q: "What is an insider threat?", a: "An attack by an employee, contractor, or other authorized user who misuses their access" },
  { cat: "Threats & Attacks", q: "What is cyberwarfare?", a: "Nation-state attacks using cyber techniques to sabotage infrastructure or gain political advantage" },
  { cat: "Threats & Attacks", q: "What is a CVE?", a: "CVE<span class='acr-full'>(Common Vulnerabilities and Exposures — a standard identifier for publicly known security vulnerabilities)</span>" },
  { cat: "Threats & Attacks", q: "What is CVSS?", a: "CVSS<span class='acr-full'>(Common Vulnerability Scoring System — standardized 0–10 score measuring vulnerability severity)</span>" },
  { cat: "Threats & Attacks", q: "What CVSS score is considered Critical?", a: "9.0–10.0" },
  { cat: "Threats & Attacks", q: "What CVSS score is considered High?", a: "7.0–8.9" },
  { cat: "Threats & Attacks", q: "What is the MITRE ATT&CK framework?", a: "A knowledge base of adversary tactics and techniques based on real-world observations<span class='acr-full'>(Adversarial Tactics, Techniques & Common Knowledge)</span>" },
  { cat: "Threats & Attacks", q: "What is the Cyber Kill Chain?", a: "A framework describing the stages of a cyberattack: Reconnaissance, Weaponization, Delivery, Exploitation, Installation, C2, Actions" },
  { cat: "Threats & Attacks", q: "What is threat intelligence?", a: "Information about current and emerging threats used to inform security decisions" },
  { cat: "Threats & Attacks", q: "What is OSINT?", a: "OSINT<span class='acr-full'>(Open Source Intelligence — information gathered from publicly available sources)</span>" },
  { cat: "Threats & Attacks", q: "What is an IoC?", a: "IoC<span class='acr-full'>(Indicator of Compromise — evidence that a system may have been breached, e.g., unusual logins, account lockouts)</span>" },

  // ========== SECURITY ARCHITECTURE (18%) ==========
  { cat: "Architecture", q: "What is network segmentation?", a: "Dividing a network into smaller zones to contain breaches and limit lateral movement" },
  { cat: "Architecture", q: "What is a DMZ?", a: "DMZ<span class='acr-full'>(Demilitarized Zone — a network zone between the internet and internal network hosting public-facing services)</span>" },
  { cat: "Architecture", q: "What is NAC?", a: "NAC<span class='acr-full'>(Network Access Control — verifies device posture and identity before granting network access)</span>" },
  { cat: "Architecture", q: "What is the difference between fail open and fail closed?", a: "Fail open allows all traffic when a device fails; fail closed blocks all traffic when a device fails" },
  { cat: "Architecture", q: "What is a firewall?", a: "A device or software that filters network traffic based on rules (ports, IPs, protocols)" },
  { cat: "Architecture", q: "What is a stateful firewall?", a: "A firewall that tracks the state of connections and only allows packets that match established sessions" },
  { cat: "Architecture", q: "What is a stateless firewall?", a: "A firewall that filters packets based only on header info (IP, port) without tracking connection state" },
  { cat: "Architecture", q: "What is an NGFW?", a: "NGFW<span class='acr-full'>(Next-Generation Firewall — operates at Layer 7, performs deep packet inspection, app awareness)</span>" },
  { cat: "Architecture", q: "What is a WAF?", a: "WAF<span class='acr-full'>(Web Application Firewall — filters HTTP traffic to protect web applications from SQL injection, XSS, etc.)</span>" },
  { cat: "Architecture", q: "What is an IDS?", a: "IDS<span class='acr-full'>(Intrusion Detection System — monitors traffic and alerts on threats but does not block)</span>" },
  { cat: "Architecture", q: "What is an IPS?", a: "IPS<span class='acr-full'>(Intrusion Prevention System — monitors traffic and actively blocks threats)</span>" },
  { cat: "Architecture", q: "What is a SIEM?", a: "SIEM<span class='acr-full'>(Security Information and Event Management — aggregates logs and alerts for centralized monitoring and analysis)</span>" },
  { cat: "Architecture", q: "What is port mirroring/port spanning?", a: "Copying network traffic from one switch port to another for monitoring or analysis" },
  { cat: "Architecture", q: "What is a VPN?", a: "VPN<span class='acr-full'>(Virtual Private Network — creates an encrypted tunnel over the internet for secure remote access)</span>" },
  { cat: "Architecture", q: "What is a site-to-site VPN?", a: "Permanently connects two office networks over an encrypted tunnel" },
  { cat: "Architecture", q: "What is a client-to-site VPN?", a: "Allows a remote user to securely connect to a corporate network" },
  { cat: "Architecture", q: "What is split tunneling?", a: "A VPN configuration where only traffic destined for the corporate network uses the VPN tunnel" },
  { cat: "Architecture", q: "What is a proxy server?", a: "An intermediary that inspects and forwards client requests, providing filtering, caching, and anonymity" },
  { cat: "Architecture", q: "What is a honeypot?", a: "A decoy system designed to attract and detect attackers" },
  { cat: "Architecture", q: "What is a honeynet?", a: "A network of honeypots used to study attacker behavior" },
  { cat: "Architecture", q: "What is SCADA?", a: "SCADA<span class='acr-full'>(Supervisory Control and Data Acquisition — industrial control systems for managing infrastructure like power grids)</span>" },
  { cat: "Architecture", q: "What is an embedded system?", a: "A device designed to perform a specific dedicated function within a larger system" },
  { cat: "Architecture", q: "What is vertical cloud scaling?", a: "Increasing the capacity of an existing server (more CPU or RAM)" },
  { cat: "Architecture", q: "What is horizontal cloud scaling?", a: "Adding more servers to a pool to distribute load" },
  { cat: "Architecture", q: "What is the shared responsibility model?", a: "In cloud computing, the division of security duties between the cloud provider and the customer" },
  { cat: "Architecture", q: "What is IaaS?", a: "IaaS<span class='acr-full'>(Infrastructure as a Service — customer manages OS and apps; provider manages hardware)</span>" },
  { cat: "Architecture", q: "What is PaaS?", a: "PaaS<span class='acr-full'>(Platform as a Service — customer manages apps and data; provider manages OS and hardware)</span>" },
  { cat: "Architecture", q: "What is SaaS?", a: "SaaS<span class='acr-full'>(Software as a Service — provider manages everything; customer just uses the application)</span>" },
  { cat: "Architecture", q: "What is FaaS?", a: "FaaS<span class='acr-full'>(Function as a Service — serverless computing where code runs in response to events, e.g., AWS Lambda)</span>" },
  { cat: "Architecture", q: "What is a public cloud?", a: "Multi-tenant cloud infrastructure offered by a provider to any customer" },
  { cat: "Architecture", q: "What is a private cloud?", a: "Cloud infrastructure exclusive to a single organization" },
  { cat: "Architecture", q: "What is a hybrid cloud?", a: "A combination of public and private cloud environments" },
  { cat: "Architecture", q: "What are the RAID levels and their key features?", a: "RAID 0=striping (no redundancy), RAID 1=mirroring, RAID 5=striping+parity (1 drive fault), RAID 6=double parity (2 drive fault), RAID 10=mirror+stripe" },
  { cat: "Architecture", q: "What is a hot site?", a: "A fully operational DR site mirroring production — fastest recovery" },
  { cat: "Architecture", q: "What is a warm site?", a: "Infrastructure ready but no active equipment — days to recover" },
  { cat: "Architecture", q: "What is a cold site?", a: "Empty space with no equipment — slowest recovery, weeks" },
  { cat: "Architecture", q: "What is RPO?", a: "RPO<span class='acr-full'>(Recovery Point Objective — maximum acceptable data loss, measured in time)</span>" },
  { cat: "Architecture", q: "What is RTO?", a: "RTO<span class='acr-full'>(Recovery Time Objective — maximum acceptable downtime before systems must be restored)</span>" },
  { cat: "Architecture", q: "What is a tabletop exercise?", a: "A discussion-based simulation used to test incident response plans without real-world pressure" },
  { cat: "Architecture", q: "What is a failover exercise?", a: "A planned simulation of system failure to verify that backup systems activate correctly" },
  { cat: "Architecture", q: "What is Secure Boot?", a: "A UEFI feature that ensures only digitally signed, trusted bootloaders and OS software can run" },

  // ========== SECURITY OPERATIONS (28%) ==========
  { cat: "Security Operations", q: "What is vulnerability management?", a: "The process of identifying, prioritizing, and remediating vulnerabilities in an environment" },
  { cat: "Security Operations", q: "What is a credentialed vulnerability scan?", a: "A vulnerability scan that uses valid credentials to log into systems and identify internal vulnerabilities" },
  { cat: "Security Operations", q: "What is a non-credentialed vulnerability scan?", a: "A scan performed without credentials — sees only what an external attacker would see" },
  { cat: "Security Operations", q: "What is penetration testing?", a: "Authorized testing that uses hacking techniques to identify and demonstrate exploitable vulnerabilities" },
  { cat: "Security Operations", q: "What is a white-box pen test?", a: "Tester has full knowledge of the environment (network maps, credentials, source code)" },
  { cat: "Security Operations", q: "What is a black-box pen test?", a: "Tester has no prior knowledge of the environment — simulates an external attacker" },
  { cat: "Security Operations", q: "What is a gray-box pen test?", a: "Tester has partial knowledge of the environment" },
  { cat: "Security Operations", q: "What does Nessus do?", a: "A commercial vulnerability scanner that identifies known vulnerabilities, misconfigurations, and compliance issues" },
  { cat: "Security Operations", q: "What does Nikto do?", a: "An open-source web application scanner that tests for SQL injection, XSS, and other web vulnerabilities" },
  { cat: "Security Operations", q: "What does Nmap do?", a: "A port scanner and network discovery tool that identifies open ports, services, and OS versions" },
  { cat: "Security Operations", q: "What does Metasploit do?", a: "A penetration testing framework used to develop and execute exploits against target systems" },
  { cat: "Security Operations", q: "What does Wireshark do?", a: "A packet capture and analysis tool that inspects network traffic in real time" },
  { cat: "Security Operations", q: "What is the SDLC?", a: "SDLC<span class='acr-full'>(Software Development Life Cycle — the process for designing, creating, testing, and maintaining software)</span>" },
  { cat: "Security Operations", q: "What are the SDLC environments in order?", a: "Development → Test/QA → Staging → Production" },
  { cat: "Security Operations", q: "What is the Waterfall SDLC model?", a: "A linear, sequential development model where each phase must complete before the next begins" },
  { cat: "Security Operations", q: "What is the Agile SDLC model?", a: "An iterative development model with short sprints and continuous collaboration and feedback" },
  { cat: "Security Operations", q: "What is DevSecOps?", a: "Integrating security practices into every stage of the DevOps development and deployment pipeline" },

let deck = [...CARDS];
let idx = 0;
let flipped = false;
let filter = "All";
let scores = {};

function getFiltered() {
  if (filter === "All") return [...CARDS];
  if (filter === "Missed") return CARDS.filter(c => scores[c.q] === "miss");
  if (filter === "Shaky") return CARDS.filter(c => scores[c.q] === "shaky");
  return CARDS.filter(c => c.cat === filter);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function doShuffle() { deck = shuffle(getFiltered()); idx = 0; flipped = false; render(); }
function setFilter(f) { filter = f; deck = getFiltered(); idx = 0; flipped = false; render(); }
function flipCard() { flipped = !flipped; render(); }
function prev() { if (idx > 0) { idx--; flipped = false; render(); } }
function next() { if (idx < deck.length - 1) { idx++; flipped = false; render(); } }

function score(level) {
  if (deck.length === 0) return;
  scores[deck[idx].q] = level;
  if (idx < deck.length - 1) { idx++; flipped = false; }
  render();
}

function getStats() {
  let miss = 0, shaky = 0, got = 0, unseen = 0;
  CARDS.forEach(c => {
    const s = scores[c.q];
    if (s === "miss") miss++; else if (s === "shaky") shaky++; else if (s === "got") got++; else unseen++;
  });
  return { miss, shaky, got, unseen };
}

const cats = ["All", ...new Set(CARDS.map(c => c.cat)), "Missed", "Shaky"];

function render() {
  const app = document.getElementById("app");
  const stats = getStats();
  const total = deck.length;
  const progress = total > 0 ? ((idx + 1) / total * 100) : 0;
  const card = deck[idx];

  let catBtns = cats.map(c =>
    `<button class="cat-btn ${filter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}${c === "Missed" ? ` (${stats.miss})` : c === "Shaky" ? ` (${stats.shaky})` : ''}</button>`
  ).join('');

  let cardHTML = '';
  if (!card) {
    cardHTML = `<div class="empty-state"><p>No cards in this category yet.</p><p>Study more and mark cards to see them here!</p></div>`;
  } else {
    cardHTML = `
      <div class="card-container">
        <div class="card ${flipped ? 'flipped' : ''}" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-cat">${card.cat}</div>
            <div class="card-question">${card.q}</div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-face card-back">
            <div class="card-cat">Answer</div>
            <div class="card-answer">${card.a}</div>
          </div>
        </div>
      </div>
      <div class="conf-row">
        <button class="conf-btn conf-miss" onclick="score('miss')">Missed</button>
        <button class="conf-btn conf-shaky" onclick="score('shaky')">Shaky</button>
        <button class="conf-btn conf-got" onclick="score('got')">Got it</button>
      </div>`;
  }

  app.innerHTML = `
    <h1>Security+ Flashcards</h1>
    <div class="subtitle">SY0-701 · ${CARDS.length} cards · one question, one answer</div>
    <div class="cat-bar">${catBtns}</div>
    ${total > 0 ? `
    <div class="filter-mode">${filter !== "All" && filter !== "Missed" && filter !== "Shaky" ? filter + ' · ' : ''}${idx + 1} of ${total}</div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">${Math.round(progress)}%</div>
    </div>` : ''}
    ${cardHTML}
    ${card ? `
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="shuffle-btn" onclick="doShuffle()">Shuffle</button>
      <button class="nav-btn" onclick="next()" ${idx >= total - 1 ? 'disabled' : ''}>Next →</button>
    </div>` : ''}
    <div class="stats">
      <div class="stat stat-miss"><div class="stat-num">${stats.miss}</div><div class="stat-label">Missed</div></div>
      <div class="stat stat-shaky"><div class="stat-num">${stats.shaky}</div><div class="stat-label">Shaky</div></div>
      <div class="stat stat-got"><div class="stat-num">${stats.got}</div><div class="stat-label">Got It</div></div>
      <div class="stat stat-unseen"><div class="stat-num">${stats.unseen}</div><div class="stat-label">Unseen</div></div>
    </div>`;
}

doShuffle();
</script>
